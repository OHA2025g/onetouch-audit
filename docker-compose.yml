services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      DB_NAME: "onetouch_audit"
      CORS_ORIGINS: "*"
      JWT_SECRET: "onetouch-audit-ai-super-secret-jwt-key-2026"
      REACT_APP_BACKEND_URL: "http://127.0.0.1:8000"
      ENABLE_PHASE2: "true"
      # Optional: if not set, AI features degrade gracefully where implemented.
      EMERGENT_LLM_KEY: ""
    depends_on:
      - mongo
    restart: unless-stopped
    expose:
      - "8000"

  web:
    build:
      context: .
      args:
        # Use nginx reverse proxy for /api in Docker so login works locally.
        REACT_APP_BACKEND_URL: ""
    ports:
      - "5715:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongo_data:
